<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Water Monitor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* Force light theme — override Telegram dark mode */
  :root { color-scheme: light only !important; }
  html { filter: none !important; background: #e8edf2 !important; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #e8edf2;
    color: #1a2a3a;
    font-family: Arial, sans-serif;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: #1a3a5c;
    border-radius: 12px;
    color: white;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 22px; font-weight: 700; color: #fff; }
  .header-sub   { font-size: 12px; color: #aac8e8; margin-top: 2px; }
  .badges { display: flex; gap: 5px; flex-direction: column; align-items: flex-end; }
  .badge {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
  }
  .badge-online  { background: #00cc66; color: #fff; }
  .badge-offline { background: #cc2244; color: #fff; }
  .badge-simu    { background: #0088cc; color: #fff; }
  .badge-live    { background: #cc8800; color: #fff; }
  .badge-home    { background: #00aa55; color: #fff; }
  .badge-away    { background: #cc8800; color: #fff; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: white; }
  .dot-green { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Panels ── */
  .panel {
    background: #ffffff;
    border: 2px solid #c0ccd8;
    border-radius: 12px;
    padding: 10px 14px;
  }
  .panel-label {
    font-size: 13px; font-weight: 700;
    color: #4a6a88; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 8px;
    border-bottom: 2px solid #e0e8f0;
    padding-bottom: 5px;
  }
  .panel-status-badge { margin-bottom: 10px; align-self: flex-start; }

  /* ── Metrics ── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .metric {
    background: #f0f5fa;
    border: 2px solid #c0d0e0;
    border-radius: 10px; padding: 10px 8px;
    text-align: center;
  }
  .metric-lbl { font-size: 13px; font-weight: 700; color: #4a6a88; margin-bottom: 4px; }
  .metric-val { font-size: 24px; font-weight: 700; color: #1a2a3a; line-height: 1.2; }
  .metric-unit { font-size: 14px; color: #0088cc; margin-left: 2px; }
  .metric.flow { border-color: #00aaaa; background: #eafafa; }
  .metric.flow .metric-lbl { color: #007788; }
  .metric.flow-out { border-color: #cc8800; background: #fff6e6; }
  .metric.flow-out .metric-lbl { color: #996600; }
  .metric.flow-out .metric-unit { color: #cc8800; }

  /* ── Consumption ── */
  .cons-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 4px; border-bottom: 1px solid #e0e8f0;
  }
  .cons-row:last-child { border-bottom: none; }
  .cons-lbl { font-size: 17px; font-weight: 600; color: #4a6a88; }
  .cons-val { font-size: 22px; font-weight: 700; color: #1a2a3a; }
  .cons-unit { font-size: 14px; color: #0088cc; margin-left: 3px; }

  /* ── Buttons ── */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    padding: 14px 8px; border-radius: 10px;
    border: 2px solid #c0ccd8;
    background: #f0f5fa;
    color: #4a6a88;
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn.active-home  { border-color: #00aa55; color: #007733; background: #e0faee; }
  .btn.active-out   { border-color: #cc8800; color: #996600; background: #fff4d0; }
  .btn.active-open  { border-color: #0088cc; color: #005599; background: #ddf0ff; }
  .btn.active-close { border-color: #cc2244; color: #991133; background: #fde0e6; }

  /* ── Leak alert ── */
  .leak-alert {
    display: none; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: #fde0e6; border: 2px solid #cc2244;
    border-radius: 10px;
    font-size: 16px; font-weight: 700; color: #cc2244;
    animation: blink 1s infinite;
  }
  .leak-alert.show { display: flex; }
  @keyframes blink { 0%,100%{border-color:#cc2244} 50%{border-color:#ff6688} }

  /* ── Log ── */
  .log-box {
    background: #f8fafc; border: 1px solid #c0ccd8;
    border-radius: 8px; padding: 8px 10px;
    height: 90px; overflow-y: auto;
    font-family: monospace; font-size: 13px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .log-entry { display: flex; gap: 8px; line-height: 1.5; }
  .log-ts   { color: #8aaacc; min-width: 58px; flex-shrink: 0; }
  .log-ok   { color: #007733; font-weight: 600; }
  .log-warn { color: #996600; font-weight: 600; }
  .log-info { color: #005599; }
  .log-err  { color: #cc2244; font-weight: 600; }
</style>
</head>
<body>

<script>
  const FIREBASE_URL = "https://project-water-v5-default-rtdb.firebaseio.com";
  const BOT_TOKEN    = "8772807332:AAF3RHE35Mc8q6omQjD6WjroB5d6XqfjXCA";
  const CHAT_ID      = "8818001527";
  const OFFLINE_SEC  = 15;  // 3 × 5s updates — μετά από αυτό θεωρείται OFFLINE
</script>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-icon">💧</span>
    <div>
      <div class="header-title">WATER MONITOR</div>
      <div class="header-sub" id="last-seen">connecting...</div>
    </div>
  </div>
  <div class="badges">
    <div class="badge badge-offline" id="status-badge">
      <span class="dot" id="status-dot"></span>
      <span id="status-txt">OFFLINE</span>
    </div>
    <div class="badge badge-simu" id="mode-badge">
      <span id="mode-txt">...</span>
    </div>
  </div>
</div>

<!-- Leak alert -->
<div class="leak-alert" id="leak-alert">⚠️ LEAK — flow while AWAY!</div>

<!-- Live readings -->
<div class="panel">
  <div class="panel-label">📡 Live Readings</div>
  <div class="metrics-grid">
    <div class="metric">
      <div class="metric-lbl">TEMP</div>
      <div class="metric-val" id="val-temp">--<span class="metric-unit">°C</span></div>
    </div>
    <div class="metric">
      <div class="metric-lbl">HUM</div>
      <div class="metric-val" id="val-hum">--<span class="metric-unit">%</span></div>
    </div>
    <div class="metric flow">
      <div class="metric-lbl">FLOW</div>
      <div class="metric-val" id="val-flow">--<span class="metric-unit">L</span></div>
    </div>
    <div class="metric flow-out">
      <div class="metric-lbl">FLOW OUT</div>
      <div class="metric-val" id="val-flowout">--<span class="metric-unit">L</span></div>
    </div>
  </div>
</div>

<!-- Consumption -->
<div class="panel">
  <div class="panel-label">💧 Consumption</div>
  <div class="cons-row">
    <span class="cons-lbl">TODAY</span>
    <span class="cons-val" id="val-daily">0<span class="cons-unit">L</span></span>
  </div>
  <div class="cons-row">
    <span class="cons-lbl">MONTH</span>
    <span class="cons-val" id="val-mtd">0<span class="cons-unit">L</span></span>
  </div>
  <div class="cons-row">
    <span class="cons-lbl">YEAR</span>
    <span class="cons-val" id="val-ytd">0<span class="cons-unit">L</span></span>
  </div>
</div>

<!-- Mode -->
<div class="panel">
  <div class="panel-label">🏠 Mode</div>
  <div class="badge panel-status-badge" id="mode-status-badge">
    <span id="mode-status-txt">...</span>
  </div>
  <div class="btn-grid">
    <button class="btn" id="btn-home" onclick="sendCmd('/mode_home')">🏠 HOME</button>
    <button class="btn" id="btn-out"  onclick="sendCmd('/mode_out')">🚶 AWAY</button>
  </div>
</div>

<!-- Valve -->
<div class="panel">
  <div class="panel-label">🔧 Valve</div>
  <div class="btn-grid">
    <button class="btn" id="btn-open"  onclick="sendCmd('/open')">🔓 OPEN</button>
    <button class="btn" id="btn-close" onclick="sendCmd('/close')">🔒 CLOSE</button>
  </div>
</div>

<!-- Log -->
<div class="panel">
  <div class="panel-label">📋 Log</div>
  <div class="log-box" id="log-box">
    <div class="log-entry">
      <span class="log-ts">--:--:--</span>
      <span class="log-info">Connecting...</span>
    </div>
  </div>
</div>

<script>
function ts() { return new Date().toLocaleTimeString('el-GR',{hour12:false}); }
function addLog(msg, type='info') {
  const box = document.getElementById('log-box');
  const el  = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-${type}">${msg}</span>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function setHTML(id, html) { document.getElementById(id).innerHTML = html; }

async function fbGet() {
  try { const r = await fetch(FIREBASE_URL+'/system.json'); return await r.json(); }
  catch(e) { return null; }
}
async function fbSet(path, value) {
  try { await fetch(FIREBASE_URL+path+'.json',{method:'PUT',body:JSON.stringify(value)}); }
  catch(e) { addLog('Firebase error','err'); }
}
async function tgSend(text) {
  try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`); }
  catch(e) { addLog('Telegram error','err'); }
}

// Valve: ο ESP32 πρέπει να κινήσει κάτι φυσικό -> περιμένουμε επιβεβαίωση (valve_mob).
// Mode: είναι αμιγώς software state, δεν χρειάζεται επιβεβαίωση από τον ESP32 -> instant.
async function sendCmd(cmd) {
  addLog('CMD: ' + cmd, 'info');
  await tgSend(cmd);

  if (cmd === '/open') {
    await fbSet('/system/valve_mob', 'Open');
    addLog('⏳ Περιμένετε... ενημερώνω βάνα', 'warn');
  }
  if (cmd === '/close') {
    await fbSet('/system/valve_mob', 'Close');
    addLog('⏳ Περιμένετε... ενημερώνω βάνα', 'warn');
  }
  if (cmd === '/mode_home') {
    await fbSet('/system/state_stable', 'Home');
    addLog('✅ Mode: ΣΤΟ ΣΠΙΤΙ', 'ok');
  }
  if (cmd === '/mode_out') {
    await fbSet('/system/state_stable', 'Out');
    addLog('✅ Mode: ΕΚΤΟΣ ΣΠΙΤΙΟΥ', 'ok');
  }
}

let lastKnownUpdateVal = 0;   // τιμή last_update που είδαμε τελευταία
let lastSeenAt        = 0;   // JS ms όταν είδαμε αλλαγή στο last_update
let wasOnline         = null; // null=άγνωστο, true/false για state-change logging
let lastCmdV          = '';
let lastEventTs       = 0;
let leakActive        = false;  // true μέχρι ο χρήστης να ανοίξει τη βάνα

function updateUI(data) {
  if (!data) return;
  setHTML('val-flow',    `${data.flow??'--'}<span class="metric-unit">L</span>`);
  setHTML('val-flowout', `${data.counter_out??'--'}<span class="metric-unit">L</span>`);
  setHTML('val-daily', `${data.daily??0}<span class="cons-unit">L</span>`);
  setHTML('val-mtd',   `${data.mtd??0}<span class="cons-unit">L</span>`);
  setHTML('val-ytd',   `${data.ytd??0}<span class="cons-unit">L</span>`);
  setHTML('val-temp',  `${data.temp??'--'}<span class="metric-unit">°C</span>`);
  setHTML('val-hum',   `${data.hum??'--'}<span class="metric-unit">%</span>`);

  const mode  = data.state_stable || 'Home';
  const valve = data.valve_stable || 'Open';
  const cmdV  = data.valve_mob    || '';

  document.getElementById('btn-home').className  = 'btn'+(mode==='Home' ?' active-home' :'');
  document.getElementById('btn-out').className   = 'btn'+(mode==='Out'  ?' active-out'  :'');
  document.getElementById('btn-open').className  = 'btn'+(valve==='Open' ?' active-open' :'');
  document.getElementById('btn-close').className = 'btn'+(valve==='Close'?' active-close':'');

  // Status badge mode
  document.getElementById('mode-status-badge').className =
    'badge panel-status-badge ' + (mode==='Out' ? 'badge-away' : 'badge-home');
  document.getElementById('mode-status-txt').textContent =
    mode==='Out' ? 'ΕΚΤΟΣ ΣΠΙΤΙΟΥ' : 'ΣΤΟ ΣΠΙΤΙ';

  // ── ONLINE/OFFLINE: βασισμένο στο ΠΟΤΕ είδαμε αλλαγή, όχι σε absolute timestamp ──
  // Δεν εξαρτόμαστε από epoch· αν το last_update άλλαξε τιμή → ESP32 είναι ζωντανός.
  const curUpdateVal = data.last_update || 0;
  if (curUpdateVal !== lastKnownUpdateVal) {
    lastKnownUpdateVal = curUpdateVal;
    lastSeenAt = Date.now();
  }
  const msSince  = lastSeenAt > 0 ? Date.now() - lastSeenAt : Infinity;
  const isOnline = lastSeenAt > 0 && msSince < OFFLINE_SEC * 1000;

  document.getElementById('status-badge').className = 'badge '+(isOnline?'badge-online':'badge-offline');
  document.getElementById('status-dot').className   = 'dot'+(isOnline?' dot-green':'');
  document.getElementById('status-txt').textContent = isOnline ? 'ONLINE' : 'OFFLINE';

  // Ώρα: από last_update_local που στέλνει ο ESP32 ("2026-06-18 13:17:24" → "13:17:24")
  const timeStr = data.last_update_local
    ? data.last_update_local.split(' ')[1]
    : '--:--:--';
  document.getElementById('last-seen').textContent =
    isOnline ? `updated: ${timeStr}` : `last seen: ${timeStr}`;

  // Log μόνο όταν αλλάζει κατάσταση (όχι κάθε 5s)
  if (isOnline !== wasOnline) {
    wasOnline = isOnline;
    addLog(isOnline ? '🟢 ESP32 ONLINE' : '🔴 ESP32 OFFLINE', isOnline ? 'ok' : 'err');
  }

  const sysMode = data.system_mode || 'SIMU';
  document.getElementById('mode-badge').className = 'badge '+(sysMode==='LIVE'?'badge-live':'badge-simu');
  document.getElementById('mode-txt').textContent = sysMode;

  // ── Επιβεβαίωση εντολής βάνας από Dashboard ──
  if (cmdV === '' && lastCmdV !== '') {
    addLog('✅ Βάνα επιβεβαιώθηκε → ' + valve, 'ok');
  }
  lastCmdV = cmdV;

  // ── last_event: log αυτόματων events (διαρροή, button, dashboard) ──
  const evTs  = data.last_event_ts || 0;
  const evMsg = data.last_event    || '';
  if (evTs !== lastEventTs && evTs !== 0) {
    lastEventTs = evTs;
    addLog(evMsg, evMsg.includes('⚠️') ? 'warn' : 'ok');
    if (evMsg.includes('ΔΙΑΡΡΟΗ')) leakActive = true;
  }

  // ── Leak alarm ────────────────────────────────────────────────
  // Επίσης ανάβει αν ανοίξει το κινητό μετά από event διαρροής που ήδη υπάρχει στη DB
  if (mode === 'Out' && valve === 'Close' && evMsg.includes('ΔΙΑΡΡΟΗ')) leakActive = true;
  // Σβήνει μόνο όταν ο χρήστης ανοίξει ξανά τη βάνα (συνειδητή πράξη)
  if (valve === 'Open') leakActive = false;
  document.getElementById('leak-alert').className =
    (mode === 'Out' && leakActive) ? 'leak-alert show' : 'leak-alert';
}

async function poll() {
  const data = await fbGet();
  if (data) {
    updateUI(data);
  } else {
    if (wasOnline !== false) {
      wasOnline = false;
      document.getElementById('status-badge').className = 'badge badge-offline';
      document.getElementById('status-dot').className   = 'dot';
      document.getElementById('status-txt').textContent = 'OFFLINE';
      addLog('🔴 Firebase απρόσιτο', 'err');
    }
  }
}

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
  // Force light background
  document.body.style.background = '#e8edf2';
  document.documentElement.style.background = '#e8edf2';
}
addLog('Dashboard loaded','info');
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
