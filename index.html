<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Water Monitor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
<style>
  :root { color-scheme: light only !important; }
  html { filter: none !important; background: #e8edf2 !important; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #e8edf2; color: #1a2a3a;
    font-family: Arial, sans-serif;
    padding: 6px; display: flex; flex-direction: column; gap: 5px;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #1a3a5c; border-radius: 10px; color: white;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 22px; font-weight: 700; color: #fff; }
  .header-sub   { font-size: 12px; color: #aac8e8; margin-top: 2px; }
  .badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .badge {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.03em;
  }
  .badge-online  { background: #00cc66; color: #fff; }
  .badge-offline { background: #cc2244; color: #fff; }
  .badge-simu    { background: #0088cc; color: #fff; }
  .badge-live    { background: #cc8800; color: #fff; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: white; }
  .dot-green { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .logout-link {
    font-size: 13px; color: #aac8e8; text-decoration: underline;
    cursor: pointer; margin-left: 5px;
  }

  /* ── Leak Status Bar ── */
  .leak-status-bar {
    border-radius: 8px; padding: 6px 12px;
    font-size: 13px; font-weight: 700;
    text-align: center; color: #fff;
    transition: background 0.3s;
  }
  .lsb-ok     { background: #00aa55; }
  .lsb-small  { background: #cc8800; }
  .lsb-medium { background: #cc5500; }
  .lsb-large  { background: #cc2244; animation: blink 1s infinite; }
  .lsb-sos    { background: #cc2244; animation: blink 0.5s infinite; }

  /* ── Leak Alert ── */
  .leak-alert {
    display: none; align-items: center; gap: 8px;
    padding: 8px 12px; background: #fde0e6; border: 2px solid #cc2244;
    border-radius: 8px; font-size: 14px; font-weight: 700; color: #cc2244;
    animation: blink 1s infinite;
  }
  .leak-alert.show { display: flex; }
  @keyframes blink { 0%,100%{border-color:#cc2244} 50%{border-color:#ff6688} }

  /* ── Main Grid ── */
  .panel {
    background: #fff; border: 1.5px solid #c0ccd8; border-radius: 10px; padding: 8px 10px;
  }
  .panel-label {
    font-size: 11px; font-weight: 700; color: #4a6a88; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 6px;
    border-bottom: 1.5px solid #e0e8f0; padding-bottom: 4px;
  }

  /* ── Metrics 3-col ── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .metric {
    background: #f0f5fa; border: 1.5px solid #c0d0e0;
    border-radius: 8px; padding: 7px 4px; text-align: center;
  }
  .metric-lbl { font-size: 11px; font-weight: 700; color: #4a6a88; margin-bottom: 2px; }
  .metric-val { font-size: 20px; font-weight: 700; color: #1a2a3a; line-height: 1.2; }
  .metric-unit { font-size: 12px; color: #0088cc; margin-left: 1px; }
  .metric-sub  { font-size: 10px; color: #007788; margin-top: 2px; }
  .metric.flow    { border-color: #00aaaa; background: #eafafa; }
  .metric.flow .metric-lbl { color: #007788; }
  .metric.flow-out { border-color: #cc8800; background: #fff6e6; }
  .metric.flow-out .metric-lbl { color: #996600; }
  .metric.flow-out .metric-unit { color: #cc8800; }
  .metric.flow-out.alert {
    border-color: #cc2244; background: #fde0e6;
    animation: blink-card 1s infinite;
  }
  .metric.flow-out.alert .metric-lbl,
  .metric.flow-out.alert .metric-unit { color: #cc2244; }
  @keyframes blink-card {
    0%,100% { border-color: #cc2244; background: #fde0e6; }
    50%     { border-color: #ff6688; background: #ffe8ec; }
  }

  /* ── Consumption 3-col ── */
  .cons-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .cons-cell {
    text-align: center; background: #f0f5fa;
    border: 1.5px solid #c0d0e0; border-radius: 8px; padding: 7px 4px;
  }
  .cons-lbl { font-size: 11px; font-weight: 700; color: #4a6a88; margin-bottom: 2px; }
  .cons-val { font-size: 18px; font-weight: 700; color: #1a2a3a; }
  .cons-unit { font-size: 11px; color: #0088cc; margin-left: 2px; }

  /* ── Mode + Valve combined ── */
  .mv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .mv-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .mv-row:last-child { margin-bottom: 0; }
  .mv-label { font-size: 12px; font-weight: 700; color: #4a6a88; min-width: 48px; }
  .mode-badge {
    flex: 1; text-align: center; padding: 5px 8px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .badge-home { background: #00aa55; color: #fff; }
  .badge-away { background: #cc8800; color: #fff; }
  .btn {
    flex: 1; padding: 10px 4px; border-radius: 8px;
    border: 1.5px solid #c0ccd8; background: #f0f5fa; color: #4a6a88;
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn.active-home  { border-color: #00aa55; color: #007733; background: #e0faee; }
  .btn.active-out   { border-color: #cc8800; color: #996600; background: #fff4d0; }
  .btn.active-open  { border-color: #0088cc; color: #005599; background: #ddf0ff; }
  .btn.active-close { border-color: #cc2244; color: #991133; background: #fde0e6; }

  /* ── Expandable ── */
  .expand-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; padding: 8px 10px;
    background: #fff; border: 1.5px solid #c0ccd8; border-radius: 10px;
    font-size: 13px; font-weight: 700; color: #4a6a88;
  }
  .expand-header:active { background: #f0f5fa; }
  .expand-arrow { font-size: 12px; transition: transform 0.2s; }
  .expand-arrow.open { transform: rotate(180deg); }
  .expand-content {
    display: none; flex-direction: column; gap: 5px;
    background: #fff; border: 1.5px solid #c0ccd8;
    border-top: none; border-radius: 0 0 10px 10px;
    padding: 8px 10px;
  }
  .expand-content.open { display: flex; }

  /* ── Log ── */
  .log-box {
    background: #f8fafc; border: 1px solid #c0ccd8;
    border-radius: 6px; padding: 6px 8px;
    height: 120px; overflow-y: auto;
    font-family: monospace; font-size: 12px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .log-entry { display: flex; gap: 6px; line-height: 1.4; }
  .log-ts   { color: #8aaacc; min-width: 54px; flex-shrink: 0; }
  .log-ok   { color: #007733; font-weight: 600; }
  .log-warn { color: #996600; font-weight: 600; }
  .log-info { color: #005599; }
  .log-err  { color: #cc2244; font-weight: 600; }

  /* ── Login screen ── */
  .login-screen {
    position: fixed; inset: 0; background: #1a3a5c;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .login-box {
    background: #fff; border-radius: 14px; padding: 28px 24px;
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .login-title { font-size: 22px; font-weight: 700; color: #1a3a5c; text-align: center; margin-bottom: 6px; }
  .login-box input {
    padding: 12px 14px; border-radius: 8px; border: 2px solid #c0ccd8;
    font-size: 16px; font-family: Arial, sans-serif;
  }
  .login-box button {
    padding: 12px; border-radius: 8px; border: none;
    background: #0088cc; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .login-error { color: #cc2244; font-size: 13px; text-align: center; min-height: 16px; }
</style>
</head>
<body>

  const firebaseConfig = {

    projectId: "project-water-v5"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.database();
  const BOT_TOKEN   = "8772807332:AAF3RHE35Mc8q6omQjD6WjroB5d6XqfjXCA";
  const CHAT_ID     = "8818001527";
  const OFFLINE_SEC = 15;
</script>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-title">💧 Water Monitor</div>
    <input type="email"    id="login-email"    placeholder="Email" autocomplete="username">
    <input type="password" id="login-password" placeholder="Κωδικός" autocomplete="current-password">
    <button onclick="doLogin()">Σύνδεση</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-content" style="display:none; flex-direction:column; gap:5px;">

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-icon">💧</span>
    <div>
      <div class="header-title">WATER MONITOR</div>
      <div class="header-sub" id="last-seen">connecting...</div>
    </div>
  </div>
  <div class="badges">
    <div class="badge badge-offline" id="status-badge">
      <span class="dot" id="status-dot"></span>
      <span id="status-txt">OFFLINE</span>
    </div>
    <div class="badge badge-simu" id="mode-badge">
      <span id="mode-txt">...</span>
    </div>
    <span class="logout-link" onclick="doLogout()">🚪</span>
  </div>
</div>

<!-- Leak Status Bar -->
<div class="leak-status-bar lsb-ok" id="leak-status-bar">💧 Σύστημα ΟΚ</div>

<!-- Leak Alert -->
<div class="leak-alert" id="leak-alert">
  <div>
    <div id="leak-alert-title"></div>
    <div id="leak-alert-detail" style="font-size:12px; margin-top:3px; font-weight:400;"></div>
  </div>
</div>

<!-- Live Readings -->
<div class="panel">
  <div class="panel-label">📡 Live Readings</div>
  <div class="metrics-grid">
    <div class="metric">

      <div class="metric-val" id="val-temp">--<span class="metric-unit">°C</span></div>

    <div class="metric flow">
      <div class="metric-lbl">FLOW</div>
      <div class="metric-val" id="val-flow">--<span class="metric-unit">L</span></div>

    <div class="metric-val" id="val-flowout">--<span class="metric-unit">L</span></div>
  </div>
</div>

<!-- Consumption -->
<div class="panel">
  <div class="panel-label">💧 Consumption</div>
  <div class="cons-grid">
    <div class="cons-cell">
      <div class="cons-lbl">TODAY</div>
      <div class="cons-val" id="val-daily">0<span class="cons-unit">L</span></div>
    </div>
    <div class="cons-cell">
      <div class="cons-lbl">MONTH</div>
      <div class="cons-val" id="val-mtd">0<span class="cons-unit">L</span></div>
    </div>
    <div class="cons-cell">
      <div class="cons-lbl">YEAR</div>
      <div class="cons-val" id="val-ytd">0<span class="cons-unit">L</span></div>
    </div>
  </div>
</div>

<!-- Mode + Valve -->
<div class="panel">
  <div class="mv-row">
    <span class="mv-label">🏠 Mode</span>
    <div class="mode-badge badge-home" id="mode-status-badge">
      <span id="mode-status-txt">ΣΤΟ ΣΠΙΤΙ</span>
    </div>
    <button class="btn" id="btn-home" onclick="sendCmd('/mode_home')">🏠</button>
    <button class="btn" id="btn-out"  onclick="sendCmd('/mode_out')">🚶</button>
  </div>
  <div class="mv-row">
    <span class="mv-label">🔧 Valve</span>
    <button class="btn" id="btn-open"  onclick="sendCmd('/open')" style="flex:2;">🔓 OPEN</button>
    <button class="btn" id="btn-close" onclick="sendCmd('/close')" style="flex:2;">🔒 CLOSE</button>
  </div>
</div>

<!-- Expandable: Ρυθμίσεις & Log -->
<div class="expand-header" onclick="toggleExpand()">
  <span>⚙️ Ρυθμίσεις &amp; Log</span>
  <span class="expand-arrow open" id="expand-arrow">▼</span>
</div>
<div class="expand-content open" id="expand-content">
  <!-- Calibration -->
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:12px; font-weight:700; color:#4a6a88; min-width:60px;">L/pulse</span>
      <input type="text" id="cal-input"
             style="width:110px; padding:6px 8px; border:1.5px solid #c0ccd8; border-radius:8px;
                    font-size:15px; font-weight:700; color:#1a2a3a;"
             placeholder="0.01321">
      <button class="btn" style="width:44px; padding:6px 8px; font-size:13px;" onclick="saveCalibration()">💾</button>
    </div>
    <!-- Χώρος για μελλοντικές ρυθμίσεις -->
  </div>
  <!-- Log -->
  <div class="log-box" id="log-box">
    <div class="log-entry">
      <span class="log-ts">--:--:--</span>

    </div>
  </div>
</div>

<script>
function toggleExpand() {
  const content = document.getElementById('expand-content');
  const arrow   = document.getElementById('expand-arrow');
  const isOpen  = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function ts() { return new Date().toLocaleTimeString('el-GR',{hour12:false}); }
function addLog(msg, type='info') {
  const box = document.getElementById('log-box');
  const el  = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-${type}">${msg}</span>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function setHTML(id, html) { document.getElementById(id).innerHTML = html; }

async function fbGet() {
  try { const snap = await db.ref('/system').once('value'); return snap.val(); }
  catch(e) { return null; }
}
async function fbSet(path, value) {
  try { await db.ref(path).set(value); }
  catch(e) { addLog('Firebase error','err'); }
}
async function tgSend(text) {
  try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`); }
  catch(e) { addLog('Telegram error','err'); }
}

async function sendCmd(cmd) {
  addLog('CMD: ' + cmd, 'info');
  await tgSend(cmd);
  if (cmd === '/open')      { await fbSet('/system/valve_mob', 'Open');  addLog('⏳ Ενημερώνω βάνα...', 'warn'); }
  if (cmd === '/close')     { await fbSet('/system/valve_mob', 'Close'); addLog('⏳ Ενημερώνω βάνα...', 'warn'); }
  if (cmd === '/mode_home') { await fbSet('/system/state_stable', 'Home'); addLog('✅ Mode: ΣΤΟ ΣΠΙΤΙ', 'ok'); }
  if (cmd === '/mode_out')  { await fbSet('/system/state_stable', 'Out');  addLog('✅ Mode: ΕΚΤΟΣ ΣΠΙΤΙΟΥ', 'ok'); }
}

async function saveCalibration() {
  let val = document.getElementById('cal-input').value.trim().replace(',', '.');
  const num = parseFloat(val);
  if (isNaN(num) || num <= 0 || num > 1) { addLog('❌ Μη έγκυρη τιμή', 'err'); return; }
  await fbSet('/system/liters_per_pulse', num);
  addLog('✅ Calibration: ' + num.toFixed(5), 'ok');
}

let lastKnownUpdateVal = 0;
let lastSeenAt   = 0;
let wasOnline    = null;
let lastCmdV     = '';
let lastEventTs  = 0;
let leakActive   = false;

function updateUI(data) {
  if (!data) return;

  setHTML('val-flow',    `${data.flow??'--'}<span class="metric-unit">L</span>`);
  setHTML('val-flowout', `${data.counter_out??'--'}<span class="metric-unit">L</span>`);
  setHTML('val-daily',   `${data.daily??0}<span class="cons-unit">L</span>`);
  setHTML('val-mtd',     `${data.mtd??0}<span class="cons-unit">L</span>`);
  setHTML('val-ytd',     `${data.ytd??0}<span class="cons-unit">L</span>`);
  setHTML('val-temp',    `${data.temp??'--'}<span class="metric-unit">°C</span>`);
  setHTML('val-hum',     `${data.hum??'--'}<span class="metric-unit">%</span>`);

  // Continuous flow
  const contMin = data.continuous_min || 0;
  document.getElementById('val-contmin').textContent = contMin > 0 ? `${contMin} λεπτά` : '';

  // Calibration placeholder
  if (data.liters_per_pulse) {
    const ci = document.getElementById('cal-input');
    if (ci && ci !== document.activeElement) ci.placeholder = data.liters_per_pulse.toFixed(5);
  }

  const mode  = data.state_stable || 'Home';
  const valve = data.valve_stable || 'Open';
  const cmdV  = data.valve_mob    || '';

  document.getElementById('btn-home').className  = 'btn'+(mode==='Home'  ? ' active-home'  : '');
  document.getElementById('btn-out').className   = 'btn'+(mode==='Out'   ? ' active-out'   : '');
  document.getElementById('btn-open').className  = 'btn'+(valve==='Open' ? ' active-open'  : '');
  document.getElementById('btn-close').className = 'btn'+(valve==='Close'? ' active-close' : '');

  document.getElementById('mode-status-badge').className =
    'mode-badge ' + (mode==='Out' ? 'badge-away' : 'badge-home');
  document.getElementById('mode-status-txt').textContent =
    mode==='Out' ? 'ΕΚΤΟΣ ΣΠΙΤΙΟΥ' : 'ΣΤΟ ΣΠΙΤΙ';

  // ONLINE/OFFLINE
  const curUpdateVal = data.last_update || 0;
  if (curUpdateVal !== lastKnownUpdateVal) { lastKnownUpdateVal = curUpdateVal; lastSeenAt = Date.now(); }
  const msSince  = lastSeenAt > 0 ? Date.now() - lastSeenAt : Infinity;
  const isOnline = lastSeenAt > 0 && msSince < OFFLINE_SEC * 1000;
  document.getElementById('status-badge').className = 'badge '+(isOnline?'badge-online':'badge-offline');
  document.getElementById('status-dot').className   = 'dot'+(isOnline?' dot-green':'');
  document.getElementById('status-txt').textContent = isOnline ? 'ONLINE' : 'OFFLINE';
  const timeStr = data.last_update_local ? data.last_update_local.split(' ')[1] : '--:--:--';
  document.getElementById('last-seen').textContent = isOnline ? `updated: ${timeStr}` : `last seen: ${timeStr}`;
  if (isOnline !== wasOnline) {
    wasOnline = isOnline;
    addLog(isOnline ? '🟢 ESP32 ONLINE' : '🔴 ESP32 OFFLINE', isOnline ? 'ok' : 'err');
  }

  const sysMode = data.system_mode || 'SIMU';
  document.getElementById('mode-badge').className = 'badge '+(sysMode==='LIVE'?'badge-live':'badge-simu');
  document.getElementById('mode-txt').textContent = sysMode;

  // Valve confirmation
  if (cmdV === '' && lastCmdV !== '') addLog('✅ Βάνα → ' + valve, 'ok');
  lastCmdV = cmdV;

  // Events
  const evTs  = data.last_event_ts || 0;
  const evMsg = data.last_event    || '';
  if (evTs !== lastEventTs && evTs !== 0) {
    lastEventTs = evTs;
    addLog(evMsg, evMsg.includes('⚠️') || evMsg.includes('🆘') ? 'warn' : 'ok');
    if (evMsg.includes('ΔΙΑΡΡΟΗ')) leakActive = true;
  }
  if (mode === 'Out' && valve === 'Close' && evMsg.includes('ΔΙΑΡΡΟΗ')) leakActive = true;
  if (valve === 'Open') leakActive = false;

  // Leak Status Bar
  const leakStatus = data.leak_status || 'OK';
  const leakLpm    = data.leak_lpm    || 0;
  const lsbClasses = { 'OK':'lsb-ok','ΜΙΚΡΗ':'lsb-small','ΜΕΤΡΙΑ':'lsb-medium','ΜΕΓΑΛΗ':'lsb-large','SOS':'lsb-sos' };
  const lsb = document.getElementById('leak-status-bar');
  lsb.className = 'leak-status-bar ' + (lsbClasses[leakStatus] || 'lsb-ok');
  lsb.textContent = leakStatus === 'OK' ? '💧 Σύστημα ΟΚ'
    : `⚠️ ${leakStatus} διαρροή — ${leakLpm.toFixed(2)} L/min — ${contMin} λεπτά`;

  // Leak Alert
  let showAlert = false, alertTitle = '', alertDetail = '';
  if (leakStatus === 'SOS') {
    showAlert = true;
    alertTitle = '🆘 SOS! Ροή με κλειστή Η/Β!';
    alertDetail = 'Πιθανή βλάβη Η/Β ή διαρροή ΠΡΙΝ τη βάνα!';
  } else if (['ΜΙΚΡΗ','ΜΕΤΡΙΑ','ΜΕΓΑΛΗ'].includes(leakStatus)) {
    showAlert = true;
    alertTitle = `⚠️ Πιθανή ${leakStatus} διαρροή HOME!`;
    alertDetail = `${leakLpm.toFixed(2)} L/min επί ${contMin} λεπτά`;
  } else if (mode === 'Out' && leakActive) {
    showAlert = true;
    alertTitle = '⚠️ Διαρροή εκτός σπιτιού! Βάνα OFF.';
  }
  document.getElementById('leak-alert').className = showAlert ? 'leak-alert show' : 'leak-alert';
  document.getElementById('leak-alert-title').textContent  = alertTitle;
  document.getElementById('leak-alert-detail').textContent = alertDetail;

  // FlowOut card color
  const flowOutVal = parseFloat(data.counter_out) || 0;
  document.getElementById('flowout-card').className =
    'metric flow-out' + (flowOutVal >= 5 ? ' alert' : '');
}

async function poll() {
  const data = await fbGet();
  if (data) { updateUI(data); }
  else {
    if (wasOnline !== false) {
      wasOnline = false;
      document.getElementById('status-badge').className = 'badge badge-offline';
      document.getElementById('status-dot').className   = 'dot';
      document.getElementById('status-txt').textContent = 'OFFLINE';
      addLog('🔴 Firebase απρόσιτο', 'err');
    }
  }
}

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
  document.body.style.background = '#e8edf2';
  document.documentElement.style.background = '#e8edf2';
}

let pollStarted = false;

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  auth.signInWithEmailAndPassword(email, pass).catch(err => {
    document.getElementById('login-error').textContent = '[' + err.code + '] ' + err.message;
  });
}

function doLogout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-content').style.display  = 'flex';
    if (!pollStarted) {
      pollStarted = true;
      addLog('Dashboard loaded', 'info');
      poll();
      setInterval(poll, 3000);
    }
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-content').style.display  = 'none';
  }
});
</script>
</body>
</html>
